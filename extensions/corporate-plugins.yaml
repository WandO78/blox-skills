# Additional curated plugins for corporate work environment
# These are NOT included in the public blox-skills registry

plugins:
  - plugin: gitlab
    source: anthropics/gitlab
    tier: curated
    category: integration
    triggers:
      files: [".gitlab-ci.yml"]
      conditions: ["gitlab remote detected"]
    requires:
      env: ["GITLAB_TOKEN"]
    priority: high
    description: "GitLab MR, CI/CD, and issue management — standard for Veolia repos"
