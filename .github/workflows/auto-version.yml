# Auto-bump version based on commit message prefix
# fix: → patch, feat: → minor, BREAKING: → major
# Runs BEFORE sync-to-blox (version files updated before sync picks them up)
name: Auto version bump

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if commit is already a version bump (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BLOX_PUSH_TOKEN }}

      - name: Determine bump type from commit message
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -qiE "^BREAKING"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qiE "^feat"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qiE "^fix"; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        run: |
          chmod +x ./scripts/bump-version.sh
          ./scripts/bump-version.sh ${{ steps.bump.outputs.type }}

      - name: Commit and push version bump
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.email "wando78@users.noreply.github.com"
          git config user.name "WandO78"
          git add -A
          CURRENT=$(grep '"version"' .claude-plugin/plugin.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          git commit -m "chore: bump version to $CURRENT"
          git push
